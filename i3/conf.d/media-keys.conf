## begin MEDIA KEYS
bindsym XF86AudioLowerVolume exec --no-startup-id pamixer -d 5
bindsym XF86AudioRaiseVolume exec --no-startup-id pamixer -i 5
bindsym XF86AudioMute exec --no-startup-id pamixer -t

bindsym XF86MonBrightnessDown exec --no-startup-id brightnessctl set 5%-
bindsym XF86MonBrightnessUp exec --no-startup-id brightnessctl set +5%
bindsym Ctrl+XF86MonBrightnessDown exec --no-startup-id brightnessctl set 1%-
bindsym Ctrl+XF86MonBrightnessUp exec --no-startup-id brightnessctl set +1%

bindsym XF86KbdBrightnessDown exec --no-startup-id ${HOME}/scripts/keyboard-backlight.sh down
bindsym XF86KbdBrightnessUp exec --no-startup-id ${HOME}/scripts/keyboard-backlight.sh up

bindsym XF86AudioPlay exec playerctl play-pause
## end MEDIA KEYS
