- shell:
    - description: Install acpi configuration
      command: |
        sudo install -Dm755 acpi/brightness.sh /etc/acpi/brightness.sh
        sudo install -Dm644 acpi/events/brightness /etc/acpi/events/brightness
      stdin: true
      stdout: true
      stderr: true
    - description: Install greetd configuration
      command: |
        sudo install -Dm644 greetd/config.toml /etc/greetd/config.toml
        sudo install -Dm644 greetd/regreet.toml /etc/greetd/regreet.toml

